# Uso: docker compose -f docker-compose.prod.yml up -d
# Vars configurables desde GitHub Actions (Settings > Secrets and variables > Actions):
#   Variables:  SERVER_IP, SMTP_HOST, SMTP_PORT, SMTP_USE_SSL, SMTP_REMITENTE_EMAIL, SMTP_REMITENTE_NOMBRE, AI_MODEL
#   Secretos:   JWT_SECRET_KEY, SMTP_USER, SMTP_PASSWORD, AI_API_KEY
#
# TODO: reemplazar mailhog por servidor SMTP real y mover credenciales a GitHub secrets.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ERPNet_Dev123!"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: "erpnet"
      RABBITMQ_DEFAULT_PASS: "ERPNet_Dev123!"
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "erpnet"
      MINIO_ROOT_PASSWORD: "ERPNet_Dev123!"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    volumes:
      - minio-data:/data

  api:
    build:
      context: ./src
      dockerfile: ERPNet.Api/Dockerfile
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ERPNET_AUTO_MIGRATE: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=erpnet;User Id=sa;Password=ERPNet_Dev123!;TrustServerCertificate=True"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:-(change-this)}"
      MessageBrokerSettings__HostName: "rabbitmq"
      EmailSettings__Host: "${SMTP_HOST:-mailhog}"
      EmailSettings__Port: "${SMTP_PORT:-1025}"
      EmailSettings__UseSsl: "${SMTP_USE_SSL:-false}"
      EmailSettings__Usuario: "${SMTP_USER:-}"
      EmailSettings__Password: "${SMTP_PASSWORD:-}"
      EmailSettings__RemitenteEmail: "${SMTP_REMITENTE_EMAIL:-noreply@erpnet.local}"
      EmailSettings__RemitenteNombre: "${SMTP_REMITENTE_NOMBRE:-ERPNet}"
      FileStorageSettings__Endpoint: "minio:9000"
      AiSettings__Habilitado: "true"
      AiSettings__ApiKey: "${AI_API_KEY:-(not-set)}"
      AiSettings__Modelo: "${AI_MODEL:-gpt-4o-mini}"
      ErpNetSettings__ErpWebClient: "https://${SERVER_IP:-(ip)}"
      ErpNetSettings__AllowedOrigins__0: "https://${SERVER_IP:-(ip)}"
    depends_on:
      - sqlserver
      - rabbitmq
      - minio

  web:
    build:
      context: ./src
      dockerfile: ERPNet.Web.Blazor/Dockerfile
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ErpNetApi__BaseUrl: "http://api:8080"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-certs:/etc/nginx/ssl
    depends_on:
      - web

  # Uso: docker compose -f docker-compose.prod.yml run --rm init-ssl
  # Genera certificado autofirmado con SAN (requerido por Chrome/Edge).
  # Pasa SERVER_IP desde .env o directamente: SERVER_IP=x.x.x.x docker compose ...
  init-ssl:
    image: alpine/openssl
    environment:
      - SERVER_IP=${SERVER_IP:-localhost}
    volumes:
      - ssl-certs:/etc/nginx/ssl
    entrypoint: ["sh", "-c", "if [ ! -f /etc/nginx/ssl/selfsigned.crt ]; then openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /etc/nginx/ssl/selfsigned.key -out /etc/nginx/ssl/selfsigned.crt -subj '/C=ES/ST=Local/L=Local/O=ERPNet/CN=erpnet.local' -addext \"subjectAltName=IP:$SERVER_IP,DNS:localhost\"; echo 'Certificado generado con SAN para IP:'$SERVER_IP; else echo 'El certificado ya existe, no se sobreescribe.'; fi"]
    profiles:
      - tools

  # Uso: docker compose -f docker-compose.prod.yml run --rm seed
  seed:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    volumes:
      - ./src:/app
    working_dir: /app
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=erpnet;User Id=sa;Password=ERPNet_Dev123!;TrustServerCertificate=True"
    entrypoint: ["dotnet", "test", "ERPNet.Testing/ERPNet.Testing.csproj", "--filter", "Category=Seeder", "/p:SkipNSwag=true"]
    depends_on:
      - sqlserver
    profiles:
      - tools

volumes:
  sqlserver-data:
  rabbitmq-data:
  minio-data:
  ssl-certs:
