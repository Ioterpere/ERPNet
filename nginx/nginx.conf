# Variable para WebSocket upgrade (debe ir antes de los server blocks)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy → Web/BFF
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Permitir subida de archivos (MinIO). Ajustar según necesidad.
    client_max_body_size 50M;

    # Proxy hacia Web/BFF (que a su vez llama a API internamente)
    location / {
        proxy_pass http://web:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket para Blazor SignalR
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts generosos para SSE (streaming IA)
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 60s;
        proxy_buffering       off;
    }

    # Futuro: descomentar para Let's Encrypt (certbot)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }
}
