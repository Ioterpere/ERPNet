services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ERPNet_Dev123!"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: "erpnet"
      RABBITMQ_DEFAULT_PASS: "ERPNet_Dev123!"
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "erpnet"
      MINIO_ROOT_PASSWORD: "ERPNet_Dev123!"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    volumes:
      - minio-data:/data

  api:
    build:
      context: ./src
      dockerfile: ERPNet.Api/Dockerfile
    ports:
      - "7268:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=erpnet;User Id=sa;Password=ERPNet_Dev123!;TrustServerCertificate=True"
      MessageBrokerSettings__HostName: "rabbitmq"
      EmailSettings__Host: "mailhog"
      FileStorageSettings__Endpoint: "minio:9000"
      ErpNetSettings__ErpWebClient: "http://localhost:7100"
      ErpNetSettings__AllowedOrigins__0: "http://localhost:7100"
    depends_on:
      - sqlserver
      - rabbitmq
      - minio

  web:
    build:
      context: ./src
      dockerfile: ERPNet.Web.Blazor/Dockerfile
    ports:
      - "7100:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ErpNetApi__BaseUrl: "http://api:8080"
    depends_on:
      - api

volumes:
  sqlserver-data:
  rabbitmq-data:
  minio-data:
